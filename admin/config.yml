locale: "zh_Hans"

backend:
  name: github
  repo: codemagicianHYQ/codemagicianHYQ.github.io
  branch: main

site_url: https://codemagicianhyq.github.io
display_url: https://codemagicianhyq.github.io
logo_url: /assets/img/avatar.jpg

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

publish_mode: editorial_workflow

collections:
  - name: "posts"
    label: "文章"
    folder: "_posts"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "posts/{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss Z", date_format: "YYYY-MM-DD", time_format: "HH:mm:ss" }
      - label: "分类"
        name: "categories"
        widget: "list"
        default: ["技术"]
      - label: "标签"
        name: "tags"
        widget: "list"
        default: ["学习"]
      - { label: "摘要", name: "description", widget: "string", required: false }
      - { label: "封面图", name: "image", widget: "image", required: false, hint: "将写入 front matter 的 image 字段，例如 /assets/uploads/xxx.png" }
      - { label: "正文", name: "body", widget: "markdown" }
